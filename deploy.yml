---
- name: Deploy NVC web app to remote server
  hosts: webservers
  become: yes
  vars:
    app_name: nvc
    app_path: /var/www/nvc
    node_packages:
      - nodejs
      - npm
  tasks:
    - name: Ensure SSH known hosts are present
      known_hosts:
        name: "{{ ansible_host }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -H ' + ansible_host) }}"
      delegate_to: localhost
      run_once: true

    - name: Ensure required packages are installed (Debian/Ubuntu)
      apt:
        name: "{{ node_packages }}"
        state: present
        update_cache: yes
      when: ansible_os_family == 'Debian'

    - name: Ensure required packages are installed (RedHat/CentOS)
      yum:
        name: "{{ node_packages }}"
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Ensure the application directory exists
      file:
        path: "{{ app_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Synchronize application files to remote server
      synchronize:
        src: "{{ playbook_dir }}/.."
        dest: "{{ app_path }}"
        delete: yes
        rsync_opts:
          - '--exclude=.git'
          - '--exclude=node_modules'
          - '--exclude=ansible.cfg'
          - '--exclude=inventory.ini'
          - '--exclude=deploy.yml'
      delegate_to: localhost

    - name: Install npm dependencies
      npm:
        path: "{{ app_path }}"
        production: yes

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes

    - name: Start the app with PM2
      shell: "pm2 start server.js --name {{ app_name }} --update-env || pm2 restart {{ app_name }}"
      args:
        chdir: "{{ app_path }}"

    - name: Save PM2 process list
      shell: pm2 save
